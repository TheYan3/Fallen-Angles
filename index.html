<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Angles Fallen</title>
      <link
         rel="icon"
         type="image/png"
         href="./img/Powerup/flame_feather000.png" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
         href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@700&display=swap"
         rel="stylesheet" />
      <link rel="stylesheet" href="style.css" />

      <script src="./js/settings.js"></script>
      <script src="./js/animation-library.js"></script>
      <script src="./models/drawableObjects.class.js"></script>
      <script src="./models/movable-Object.class.js"></script>
      <script src="./models/player.class.js"></script>
      <script src="./models/golem.class.js"></script>
      <script src="./models/reaper.class.js"></script>
      <script src="./models/minotaur.class.js"></script>
      <script src="./models/sky.class.js"></script>
      <script src="./models/ground-Object.class.js"></script>
      <script src="./models/rocks.class.js"></script>
      <script src="./models/powerUp.class.js"></script>
      <script src="./models/cloud.class.js"></script>
      <script src="./models/level.class.js"></script>
      <script src="./Abilities/teleport.class.js"></script>
      <script src="./Abilities/heal.js"></script>
      <script src="./Abilities/fear.js"></script>
      <script src="./models/Abilities.class.js"></script>
      <script src="./models/endboss.class.js"></script>
      <script src="./Levels/level1.js"></script>
      <script src="./models/healthbar.class.js"></script>
      <script src="./models/powerUpCounter.class.js"></script>
      <script src="./models/reapeat_btn.class.js"></script>
      <script src="./models/gameOver.class.js"></script>
      <script src="./models/world.class.js"></script>
      <script src="./models/keyboard.class.js"></script>
      <script src="./js/game.js"></script>
      <script src="./js/page.js"></script>
   </head>
   <body>
      <div id="startMenue" class="menue-container">
         <button onclick="gameStart()" class="menue-button play-button">
            <img src="./img/Menü/Buttons/Play_Button.png" alt="Play_Button" />
         </button>
         <button class="menue-button hidden">
            <img
               src="./img/Menü/Buttons/Settings-Button.png"
               alt="Options_Button" />
         </button>
         <img
            class="keybinds"
            src="img\Movement_keyboard.png"
            alt="MoKeybuinds" />
      </div>

      <div id="gameContainer" class="game-container hidden">
         <canvas id="canvas"> </canvas>
         <div class="game-button-row">
            <button
               id="fullscreenButton"
               class="game-control-button"
               type="button"
               aria-label="Fullscreen"
               onclick="toggleFullscreen()">
               ⛶
            </button>
            <button
               id="backToMenueButton"
               class="game-control-button"
               type="button"
               aria-label="Back to menu"
               onclick="backToMenue()">
               x
            </button>
         </div>
      </div>
   </body>
</html>
