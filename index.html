<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Angles Fallen</title>
      <link
         rel="icon"
         type="image/png"
         href="./img/Powerup/flame_feather000.png" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
         href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@700&display=swap"
         rel="stylesheet" />
      <link rel="stylesheet" href="style.css" />

      <script src="./js/settings.js"></script>
      <script src="./js/audio-library.js"></script>
      <script src="./js/animation-library.js"></script>
      <script src="./models/base/drawableObjects.class.js"></script>
      <script src="./models/base/animated-object.class.js"></script>
      <script src="./models/base/movable-Object.class.js"></script>
      <script src="./models/player/player-attack.class.js"></script>
      <script src="./models/player/player-status-effects.class.js"></script>
      <script src="./models/player/player.class.js"></script>
      <script src="./models/enemies/golem.class.js"></script>
      <script src="./models/enemies/reaper.class.js"></script>
      <script src="./models/enemies/minotaur.class.js"></script>
      <script src="./models/objects/sky.class.js"></script>
      <script src="./models/objects/ground-Object.class.js"></script>
      <script src="./models/objects/rocks.class.js"></script>
      <script src="./models/objects/powerUp.class.js"></script>
      <script src="./models/objects/cloud.class.js"></script>
      <script src="./models/level/level.class.js"></script>
      <script src="./models/Abilities/teleport.class.js"></script>
      <script src="./models/Abilities/heal.js"></script>
      <script src="./models/Abilities/fear.js"></script>
      <script src="./models/Abilities/Abilities.class.js"></script>
      <script src="./models/enemies/endboss.class.js"></script>
      <script src="./Levels/level1.js"></script>
      <script src="./models/ui/healthbar.class.js"></script>
      <script src="./models/ui/powerUpCounter.class.js"></script>
      <script src="./models/ui/repeat-button.class.js"></script>
      <script src="./models/ui/gameOver.class.js"></script>
      <script src="./models/world/world-renderer.class.js"></script>
      <script src="./models/world/enemy-controller.class.js"></script>
      <script src="./models/world/world-collision.class.js"></script>
      <script src="./models/world/world.class.js"></script>
      <script src="./models/input/keyboard.class.js"></script>
      <script src="./js/game.js"></script>
      <script src="./js/fullscreen-controller.js"></script>
      <script src="./js/responsive-canvas.js"></script>
      <script src="./script.js"></script>
   </head>
   <body>
      <img
         class="header"
         src="img/Menü/Header2.png"
         alt="Fallen Angels Header" />
      <div id="startMenu" class="menu-container">
         <button
            id="startMuteButton"
            class="game-control-button"
            style="position: absolute; top: 20px; right: 20px; z-index: 100"
            onclick="toggleMute()"
            aria-label="Mute">
            ♪
         </button>
         <button onclick="gameStart()" class="menu-button play-button">
            <img src="./img/Menü/Buttons/Play_Button1.png" alt="Play_Button" />
         </button>
         <img
            class="keybinds"
            src="img/Movement_keyboard.png"
            alt="Movement keyboard controls" />
         <a href="impressum.html" class="impressum-link">Impressum</a>
      </div>

      <div id="gameContainer" class="game-container hidden">
         <div class="canvas-toolbar">
            <div class="game-button-row">
               <button
                  id="fullscreenButton"
                  class="game-control-button"
                  type="button"
                  aria-label="Fullscreen"
                  onclick="toggleFullscreen()">
                  ⛶
               </button>
               <button
                  id="keyboardHelpButton"
                  class="game-control-button"
                  type="button"
                  oncontextmenu="return false;"
                  aria-label="Show keyboard controls"
                  onpointerdown="showKeyboardControls(event)">
                  ⌨
               </button>
               <button
                  id="muteButton"
                  class="game-control-button"
                  type="button"
                  onclick="toggleMute()"
                  aria-label="Mute">
                  ♪
               </button>
               <button
                  id="backToMenuButton"
                  class="game-control-button"
                  type="button"
                  aria-label="Back to menu"
                  onclick="backToMenu();">
                  x
               </button>
            </div>
         </div>
         <div id="keyboardControlsOverlay" class="keyboard-controls-overlay">
            <img
               src="img/Movement_keyboard.png"
               alt="Movement keyboard controls" />
         </div>
         <canvas id="canvas"> </canvas>
         <p class="mobile-control-hint">Turn your device to move!</p>
         <div class="mobile-control-row" aria-label="Game controls">
            <div class="mobile-control-group">
               <button
                  class="game-control-button"
                  type="button"
                  oncontextmenu="return false;"
                  aria-label="Move left"
                  onpointerdown="setMovementControl('LEFT', true)"
                  onpointerup="setMovementControl('LEFT', false)"
                  onpointerleave="setMovementControl('LEFT', false)"
                  onpointercancel="setMovementControl('LEFT', false)">
                  ←
               </button>
               <button
                  class="game-control-button"
                  type="button"
                  oncontextmenu="return false;"
                  aria-label="Move right"
                  onpointerdown="setMovementControl('RIGHT', true)"
                  onpointerup="setMovementControl('RIGHT', false)"
                  onpointerleave="setMovementControl('RIGHT', false)"
                  onpointercancel="setMovementControl('RIGHT', false)">
                  →
               </button>
            </div>
            <div class="mobile-control-group">
               <button
                  class="game-control-button"
                  type="button"
                  oncontextmenu="return false;"
                  aria-label="Jump"
                  onpointerdown="setControlKey('SPACE', true)"
                  onpointerup="setControlKey('SPACE', false)"
                  onpointerleave="setControlKey('SPACE', false)"
                  onpointercancel="setControlKey('SPACE', false)">
                  ↑
               </button>
               <button
                  class="game-control-button"
                  type="button"
                  oncontextmenu="return false;"
                  aria-label="Attack"
                  onpointerdown="setControlKey('UP', true)"
                  onpointerup="setControlKey('UP', false)"
                  onpointerleave="setControlKey('UP', false)"
                  onpointercancel="setControlKey('UP', false)">
                  ⚔
               </button>
            </div>
         </div>
      </div>
   </body>
</html>
