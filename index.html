<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Angles Fallen</title>
      <link
         rel="icon"
         type="image/png"
         href="./img/Powerup/flame_feather000.png" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
         href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@700&display=swap"
         rel="stylesheet" />
      <link rel="stylesheet" href="style.css" />

      <script src="./js/settings.js"></script>
      <script src="./js/animation-library.js"></script>
      <script src="./models/drawableObjects.class.js"></script>
      <script src="./models/movable-Object.class.js"></script>
      <script src="./models/player.class.js"></script>
      <script src="./models/golem.class.js"></script>
      <script src="./models/reaper.class.js"></script>
      <script src="./models/minotaur.class.js"></script>
      <script src="./models/sky.class.js"></script>
      <script src="./models/ground-Object.class.js"></script>
      <script src="./models/rocks.class.js"></script>
      <script src="./models/powerUp.class.js"></script>
      <script src="./models/cloud.class.js"></script>
      <script src="./models/level.class.js"></script>
      <script src="./Abilities/teleport.class.js"></script>
      <script src="./Abilities/heal.js"></script>
      <script src="./Abilities/fear.js"></script>
      <script src="./models/Abilities.class.js"></script>
      <script src="./models/endboss.class.js"></script>
      <script src="./Levels/level1.js"></script>
      <script src="./models/healthbar.class.js"></script>
      <script src="./models/powerUpCounter.class.js"></script>
      <script src="./models/repeat-button.class.js"></script>
      <script src="./models/gameOver.class.js"></script>
      <script src="./models/world.class.js"></script>
      <script src="./models/keyboard.class.js"></script>
      <script src="./js/game.js"></script>
      <script src="./js/page.js"></script>
   </head>
   <body>
      <img
         class="header"
         src="img/Menü/Header2.png"
         alt="Fallen Angels Header" />
      <div id="startMenu" class="menu-container">
         <button
            id="startMuteButton"
            class="game-control-button"
            style="position: absolute; top: 20px; right: 20px; z-index: 100"
            onclick="toggleMute()"
            aria-label="Mute">
            ♪
         </button>
         <button onclick="gameStart()" class="menu-button play-button">
            <img src="./img/Menü/Buttons/Play_Button1.png" alt="Play_Button" />
         </button>
         <button class="menu-button hidden">
            <img
               src="./img/Menü/Buttons/Settings-Button.png"
               alt="Options_Button" />
         </button>
         <img
            class="keybinds"
            src="img/Movement_keyboard.png"
            alt="Movement keyboard controls" />
         <a href="impressum.html" class="impressum-link">Impressum</a>
      </div>

      <div id="gameContainer" class="game-container hidden">
         <div class="canvas-toolbar">
            <div class="game-button-row">
               <button
                  id="fullscreenButton"
                  class="game-control-button"
                  type="button"
                  aria-label="Fullscreen"
                  onclick="toggleFullscreen()">
                  ⛶
               </button>
               <button
                  id="muteButton"
                  class="game-control-button"
                  type="button"
                  onclick="toggleMute()"
                  aria-label="Mute">
                  ♪
               </button>
               <button
                  id="backToMenuButton"
                  class="game-control-button"
                  type="button"
                  aria-label="Back to menu"
                  onclick="backToMenu();">
                  x
               </button>
            </div>
         </div>
         <canvas id="canvas"> </canvas>
         <p class="mobile-control-hint">Turn your device to move!</p>
         <div class="mobile-control-row" aria-label="Game controls">
            <div class="mobile-control-group">
               <button
                  class="game-control-button"
                  type="button"
                  oncontextmenu="return false;"
                  aria-label="Move left"
                  onpointerdown="setMovementControl('LEFT', true)"
                  onpointerup="setMovementControl('LEFT', false)"
                  onpointerleave="setMovementControl('LEFT', false)"
                  onpointercancel="setMovementControl('LEFT', false)">
                  ←
               </button>
               <button
                  class="game-control-button"
                  type="button"
                  oncontextmenu="return false;"
                  aria-label="Move right"
                  onpointerdown="setMovementControl('RIGHT', true)"
                  onpointerup="setMovementControl('RIGHT', false)"
                  onpointerleave="setMovementControl('RIGHT', false)"
                  onpointercancel="setMovementControl('RIGHT', false)">
                  →
               </button>
            </div>
            <div class="mobile-control-group">
               <button
                  class="game-control-button"
                  type="button"
                  oncontextmenu="return false;"
                  aria-label="Jump"
                  onpointerdown="setControlKey('SPACE', true)"
                  onpointerup="setControlKey('SPACE', false)"
                  onpointerleave="setControlKey('SPACE', false)"
                  onpointercancel="setControlKey('SPACE', false)">
                  ↑
               </button>
               <button
                  class="game-control-button"
                  type="button"
                  oncontextmenu="return false;"
                  aria-label="Attack"
                  onpointerdown="setControlKey('UP', true)"
                  onpointerup="setControlKey('UP', false)"
                  onpointerleave="setControlKey('UP', false)"
                  onpointercancel="setControlKey('UP', false)">
                  ⚔
               </button>
            </div>
         </div>
      </div>
   </body>
</html>
